<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topher's Sora Prompt Sorter</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: #ffffff;
      --text: #1f2520;
      --muted: #66706a;
      --line: #d8ded7;
      --accent: #176b55;
      --accent-dark: #0f4d3d;
      --warn: #8f4a10;
      --error: #a73434;
      --shadow: 0 18px 44px rgba(31, 37, 32, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(1080px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 44px 0 24px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 860px;
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .drop-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 84px;
      padding: 16px;
      border: 2px dashed #a9b5ad;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .drop-zone.dragging {
      border-color: var(--accent);
      background: #eef7f2;
      transform: translateY(-1px);
    }

    .drop-zone strong {
      display: block;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .controls {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: flex-start;
      width: 100%;
    }

    button,
    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .file-button {
      width: 100%;
      text-align: center;
    }

    .file-button.split {
      flex: 1;
      min-width: 0;
      width: auto;
      padding: 0 12px;
    }

    .has-tooltip {
      position: relative;
    }

    .has-tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      top: calc(100% + 10px);
      z-index: 20;
      width: min(300px, 80vw);
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(31, 37, 32, 0.16);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      transform: translateX(-50%);
      visibility: hidden;
      white-space: normal;
    }

    .has-tooltip:hover::after,
    .has-tooltip:focus-visible::after {
      opacity: 1;
      visibility: visible;
    }

    button.secondary,
    .file-button.secondary {
      background: #fff;
      color: var(--accent-dark);
    }

    button.compact {
      min-height: 42px;
      padding: 0 16px;
      border-color: var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--accent-dark);
      font-size: inherit;
      font-weight: 700;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    [hidden] {
      display: none !important;
    }

    input[type="file"] {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .top-grid {
      display: grid;
      grid-template-columns: minmax(260px, 1.25fr) repeat(2, minmax(160px, 1fr));
      gap: 12px;
      margin: 10px 0 12px;
      align-items: stretch;
    }

    .stat {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 84px;
      padding: 16px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      margin-top: 6px;
      font-size: 28px;
      line-height: 1;
    }

    .stat-value {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid #dfe5df;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity 1s ease;
    }

    .spinner.visible {
      opacity: 1;
    }

    @keyframes spin {
      to {
        transform: translateY(3px) rotate(360deg);
      }
    }

    .output {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
    }

    .output-header {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto minmax(220px, 1fr);
      align-items: center;
      gap: 16px;
      min-height: 71px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .output-header strong {
      font-size: 16px;
      justify-self: start;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-self: end;
    }

    .similarity-control {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-self: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .similarity-control input {
      width: 160px;
      margin: 0;
      accent-color: var(--accent);
    }

    .similarity-value {
      display: inline-block;
      min-width: 36px;
      text-align: right;
    }

    .preview-content {
      display: block;
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 30px;
      overflow-x: hidden;
      overflow-y: auto;
	      border: 0;
	      padding: 32px 16px 16px;
	      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
	      color: var(--text);
	      outline: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
	      cursor: text;
      user-select: text;
      -webkit-user-select: text;
      scrollbar-color: #9aa79f #eef1ed;
      scrollbar-width: thin;
    }

	    .preview-prompt {
	      position: relative;
	      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      width: 100%;
	    }

	    .preview-prompt:not(:last-child)::after {
	      content: "";
	      display: block;
	      width: 100%;
      height: 1px;
      margin: 30px auto 0;
	      background: #edf0eb;
	    }

    .preview-more {
      color: var(--muted);
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin-bottom: 20px;
      text-align: center;
      white-space: nowrap;
    }

    .preview-content::-webkit-scrollbar {
      width: 10px;
    }

    .preview-content::-webkit-scrollbar-track {
      background: #eef1ed;
      border-left: 1px solid var(--line);
    }

    .preview-content::-webkit-scrollbar-thumb {
      background: #9aa79f;
      border: 2px solid #eef1ed;
      border-radius: 999px;
    }

    .preview-content::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    .error {
      color: var(--error);
    }

    .warn {
      color: var(--warn);
    }

    @media (max-width: 760px) {
      main {
        width: min(100vw - 20px, 1080px);
        padding: 20px 0;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .output-header {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .output-header strong,
      .similarity-control,
      .preview-actions {
        justify-self: stretch;
      }

      .top-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Topher&apos;s Sora Prompt Sorter</h1>
        <p class="subtitle">Import your generations JSON files from the official Sora export to organize and de-duplicate all your prompts.</p>
      </div>
      <button class="compact" id="clearButton" type="button" disabled>Restart</button>
    </header>

    <section class="top-grid" aria-label="Conversion controls and summary">
      <div class="panel drop-zone" id="dropZone">
        <div class="controls">
		          <label class="file-button secondary split has-tooltip" for="fileInput" data-tooltip="Choose one or many generations JSON files. You can upload some, then upload even more.">Choose Files</label>
		          <input id="fileInput" type="file" accept=".json,application/json" multiple>
		          <button class="file-button secondary split has-tooltip" id="folderButton" type="button" data-tooltip="Choose a top-level folder that contains all your different generations JSON files within.">Choose Folder</button>
	          <input id="folderInput" type="file" accept=".json,application/json" webkitdirectory directory multiple>
        </div>
      </div>
	      <div class="panel stat">
	        <span>Files loaded</span>
	        <strong id="fileCount">0</strong>
	      </div>
		      <div class="panel stat">
		        <span id="promptCountLabel">Unique prompts</span>
		        <div class="stat-value">
		          <strong id="promptCount">0</strong>
		          <span class="spinner" id="promptSpinner" hidden aria-label="Sorting prompts"></span>
		        </div>
		      </div>
    </section>

	    <section class="panel output">
	      <div class="output-header">
	        <strong>Preview</strong>
	        <p id="statusText" hidden></p>
	        <label class="similarity-control" id="similarityControl" hidden>
	          <span>Uniqueness</span>
	          <input id="similarityInput" type="range" min="0" max="100" value="50">
	          <span class="similarity-value" id="similarityValue">50%</span>
	        </label>
	        <div class="preview-actions">
	          <button class="compact" id="previewCopyButton" type="button" hidden disabled>Copy to Clipboard</button>
	          <button id="downloadButton" type="button" hidden disabled>Download</button>
	        </div>
      </div>
      <div class="preview-content" id="csvOutput" aria-live="polite"></div>
    </section>
  </main>

  <script>
	    const dropZone = document.getElementById("dropZone");
	    const fileInput = document.getElementById("fileInput");
	    const folderButton = document.getElementById("folderButton");
	    const folderInput = document.getElementById("folderInput");
    const clearButton = document.getElementById("clearButton");
    const previewCopyButton = document.getElementById("previewCopyButton");
    const downloadButton = document.getElementById("downloadButton");
    const similarityControl = document.getElementById("similarityControl");
    const similarityInput = document.getElementById("similarityInput");
    const similarityValue = document.getElementById("similarityValue");
    const csvOutput = document.getElementById("csvOutput");
    const statusText = document.getElementById("statusText");
	    const fileCount = document.getElementById("fileCount");
	    const promptCountLabel = document.getElementById("promptCountLabel");
	    const promptCount = document.getElementById("promptCount");
	    const promptSpinner = document.getElementById("promptSpinner");

	    const state = {
	      filesLoaded: 0,
	      objectsScanned: 0,
	      records: [],
	      outputRecords: [],
	      dedupedRecords: [],
	      loadedFileHashes: new Set(),
	      errors: 0
	    };

	    const DEDUPE = {
	      bands: 16,
	      rowsPerBand: 4,
	      shingleSize: 5,
	      looseShingleSize: 3
	    };

	    const HASH_PRIME = 2147483647;
	    const SIGNATURE_SIZE = DEDUPE.bands * DEDUPE.rowsPerBand;
	    const HASH_PARAMS = Array.from({ length: SIGNATURE_SIZE }, (_, index) => ({
	      a: ((index + 1) * 2654435761) % HASH_PRIME || 1,
	      b: ((index + 1) * 1597334677) % HASH_PRIME
	    }));

	    const countFormatter = new Intl.NumberFormat();

	    function formatPromptLine(value) {
	      return String(value)
	        .replace(/\t/g, " ")
	        .replace(/\s*\r?\n+\s*/g, " ")
	        .trim();
	    }

	    function formatTsvCell(value) {
	      return formatPromptLine(value);
	    }

	    function formatCsvCell(value) {
	      return `"${String(value).replace(/\t/g, " ").replace(/\r\n?/g, "\n").trim().replaceAll('"', '""')}"`;
	    }

	    function escapeHtml(value) {
	      return String(value)
	        .replaceAll("&", "&amp;")
	        .replaceAll("<", "&lt;")
	        .replaceAll(">", "&gt;")
	        .replaceAll('"', "&quot;")
	        .replaceAll("'", "&#039;");
	    }

	    function makePromptRecord(item) {
	      return {
	        id: item.id || "",
	        width: item.width || "",
	        height: item.height || "",
	        prompt: item.prompt
	      };
	    }

	    function rowValues(record, index) {
	      return [
	        index + 1,
	        record.id,
	        record.prompt,
	        record.width,
	        record.height
	      ];
	    }

	    function buildTsvRows() {
	      const header = ["Order", "ID", "Prompt", "Width", "Height"].join("\t");
	      const rows = state.outputRecords.map((record, index) => rowValues(record, index).map(formatTsvCell).join("\t"));
	      return [header, ...rows].join("\r\n");
	    }

	    function buildCsvRows() {
	      const header = ["Order", "ID", "Prompt", "Width", "Height"].map(formatCsvCell).join(",");
	      const rows = state.outputRecords.map((record, index) => rowValues(record, index).map(formatCsvCell).join(","));
	      return [header, ...rows].join("\r\n");
	    }

	    function buildClipboardHtml() {
	      const headers = ["Order", "ID", "Prompt", "Width", "Height"];
	      const headerRow = headers.map((header) => `<th>${escapeHtml(header)}</th>`).join("");
	      const rows = state.outputRecords.map((record, index) => {
	        const cells = rowValues(record, index).map((value) => {
	          const cellValue = String(value).replace(/\t/g, " ").replace(/\r\n?/g, "\n").trim();
	          return `<td style="white-space: pre-wrap;">${escapeHtml(cellValue).replaceAll("\n", "<br>")}</td>`;
	        }).join("");
	        return `<tr>${cells}</tr>`;
	      }).join("");

	      return `<table><thead><tr>${headerRow}</tr></thead><tbody>${rows}</tbody></table>`;
	    }

	    function buildPreviewRows() {
	      return state.outputRecords.map((record) => String(record.prompt).replace(/\t/g, " ").trim());
	    }

	    function renderPreview() {
	      csvOutput.replaceChildren();
	      const previewRows = buildPreviewRows();
	      const visibleRows = previewRows.slice(0, 25);
	      for (const prompt of visibleRows) {
	        const promptElement = document.createElement("div");
	        promptElement.className = "preview-prompt";
	        promptElement.textContent = prompt;
	        csvOutput.appendChild(promptElement);
	      }

	      if (previewRows.length > visibleRows.length) {
	        const moreElement = document.createElement("div");
	        moreElement.className = "preview-more";
	        moreElement.textContent = `+${countFormatter.format(previewRows.length - visibleRows.length)} more prompts`;
	        csvOutput.appendChild(moreElement);
	      }
	    }

	    function syncOutputPrompts() {
	      state.outputRecords = [...state.dedupedRecords]
	        .sort((left, right) => String(right.id).localeCompare(String(left.id)));
	    }

	    function render() {
	      syncOutputPrompts();
	      const hasPrompts = state.outputRecords.length > 0;
	      fileCount.textContent = countFormatter.format(state.filesLoaded);
	      promptCountLabel.textContent = Number(similarityInput.value) === 0 ? "Total prompts" : "Unique prompts";
	      promptCount.textContent = countFormatter.format(state.outputRecords.length);
	      similarityValue.textContent = `${similarityInput.value}%`;
	      if (hasPrompts) {
	        renderPreview();
	      } else {
	        csvOutput.replaceChildren();
	      }
	      statusText.textContent = "";
	      statusText.hidden = true;
	      clearButton.disabled = state.filesLoaded === 0 && state.records.length === 0 && state.errors === 0;
	      previewCopyButton.disabled = !hasPrompts;
	      downloadButton.disabled = !hasPrompts;
	      similarityControl.hidden = state.records.length === 0;
	      previewCopyButton.hidden = !hasPrompts;
	      downloadButton.hidden = !hasPrompts;

	    }

	    function waitForPaint() {
	      return new Promise((resolve) => {
	        requestAnimationFrame(() => requestAnimationFrame(resolve));
	      });
	    }

	    function showSpinner() {
	      promptSpinner.hidden = false;
	      requestAnimationFrame(() => promptSpinner.classList.add("visible"));
	    }

	    function hideSpinner() {
	      promptSpinner.classList.remove("visible");
	      promptSpinner.hidden = true;
	    }

	    function createSpinnerDelay(delay = 200) {
	      if (delay <= 0) {
	        showSpinner();
	        return hideSpinner;
	      }

	      const timeout = window.setTimeout(showSpinner, delay);

	      return () => {
	        window.clearTimeout(timeout);
	        hideSpinner();
	      };
	    }

	    async function refreshDedupe() {
	      showSpinner();
	      await waitForPaint();
	      updateOutputPrompts();
	      render();
	      hideSpinner();
	    }

	    function normalizeWords(value) {
	      return String(value)
	        .toLowerCase()
	        .replace(/[^a-z0-9@#]+/g, " ")
	        .trim()
	        .split(/\s+/)
	        .filter(Boolean);
	    }

	    const STOPWORDS = new Set([
	      "a", "an", "and", "are", "as", "at", "be", "by", "for", "from", "has", "have", "he", "her", "his", "in", "into", "is", "it", "its",
	      "of", "on", "or", "she", "that", "the", "their", "them", "they", "this", "to", "was", "were", "with"
	    ]);

	    function makeShingles(prompt, size = DEDUPE.shingleSize) {
	      const words = normalizeWords(prompt);
	      if (words.length === 0) {
	        return new Set();
	      }

	      if (words.length <= size) {
	        return new Set([words.join(" ")]);
	      }

	      const shingles = new Set();
	      for (let index = 0; index <= words.length - size; index += 1) {
	        shingles.add(words.slice(index, index + size).join(" "));
	      }
	      return shingles;
	    }

	    function buildTokenWeights(records) {
	      const documentFrequency = new Map();
	      const totalDocuments = records.length || 1;

	      for (const record of records) {
	        const uniqueTokens = new Set();
	        for (const word of normalizeWords(record.prompt)) {
	          if (word.length <= 2 || STOPWORDS.has(word)) {
	            continue;
	          }
	          uniqueTokens.add(word);
	        }

	        for (const token of uniqueTokens) {
	          documentFrequency.set(token, (documentFrequency.get(token) || 0) + 1);
	        }
	      }

	      const weights = new Map();
	      for (const [token, frequency] of documentFrequency) {
	        weights.set(token, Math.log((1 + totalDocuments) / (1 + frequency)) + 1);
	      }
	      return weights;
	    }

	    function makeTokenProfile(prompt, tokenWeights) {
	      const counts = new Map();
	      for (const word of normalizeWords(prompt)) {
	        if (word.length <= 2 || STOPWORDS.has(word)) {
	          continue;
	        }
	        counts.set(word, (counts.get(word) || 0) + (tokenWeights.get(word) || 1));
	      }
	      return counts;
	    }

	    function hashString(value) {
	      let hash = 2166136261;
	      for (let index = 0; index < value.length; index += 1) {
	        hash ^= value.charCodeAt(index);
	        hash = Math.imul(hash, 16777619);
	      }
	      return hash >>> 0;
	    }

	    function fileFingerprint(text) {
	      return `${text.length}:${hashString(text)}`;
	    }

	    function makeSignature(shingles) {
	      const signature = new Array(SIGNATURE_SIZE).fill(HASH_PRIME);
	      for (const shingle of shingles) {
	        const baseHash = hashString(shingle);
	        for (let index = 0; index < SIGNATURE_SIZE; index += 1) {
	          const { a, b } = HASH_PARAMS[index];
	          const hash = (Math.imul(a, baseHash) + b) % HASH_PRIME;
	          if (hash < signature[index]) {
	            signature[index] = hash;
	          }
	        }
	      }
	      return signature;
	    }

	    function jaccardSimilarity(left, right) {
	      if (left.size === 0 && right.size === 0) {
	        return 1;
	      }

	      let shared = 0;
	      const smaller = left.size < right.size ? left : right;
	      const larger = left.size < right.size ? right : left;

	      for (const value of smaller) {
	        if (larger.has(value)) {
	          shared += 1;
	        }
	      }

	      return shared / (left.size + right.size - shared);
	    }

	    function tokenCosineSimilarity(left, right) {
	      if (left.size === 0 && right.size === 0) {
	        return 1;
	      }

	      let dot = 0;
	      let leftMagnitude = 0;
	      let rightMagnitude = 0;

	      for (const [token, count] of left) {
	        dot += count * (right.get(token) || 0);
	        leftMagnitude += count * count;
	      }

	      for (const count of right.values()) {
	        rightMagnitude += count * count;
	      }

	      if (leftMagnitude === 0 || rightMagnitude === 0) {
	        return 0;
	      }

	      return dot / (Math.sqrt(leftMagnitude) * Math.sqrt(rightMagnitude));
	    }

	    function tokenContainmentSimilarity(left, right) {
	      if (left.size === 0 && right.size === 0) {
	        return 1;
	      }

	      const leftWeight = [...left.values()].reduce((sum, value) => sum + value, 0);
	      const rightWeight = [...right.values()].reduce((sum, value) => sum + value, 0);
	      const [smaller, larger, smallerWeight] = leftWeight < rightWeight
	        ? [left, right, leftWeight]
	        : [right, left, rightWeight];
	      let sharedWeight = 0;

	      for (const [token, weight] of smaller) {
	        if (larger.has(token)) {
	          sharedWeight += Math.min(weight, larger.get(token));
	        }
	      }

	      return smallerWeight === 0 ? 0 : sharedWeight / smallerWeight;
	    }

	    function promptSimilarity(left, right) {
	      return Math.max(
	        jaccardSimilarity(left.shingles, right.shingles),
	        jaccardSimilarity(left.looseShingles, right.looseShingles),
	        tokenCosineSimilarity(left.tokens, right.tokens),
	        tokenContainmentSimilarity(left.tokens, right.tokens)
	      );
	    }

	    function makePromptProfile(prompt, tokenWeights) {
	      return {
	        shingles: makeShingles(prompt, DEDUPE.shingleSize),
	        looseShingles: makeShingles(prompt, DEDUPE.looseShingleSize),
	        tokens: makeTokenProfile(prompt, tokenWeights)
	      };
	    }

	    function dedupeRecords(records) {
	      const sortedRecords = [...records].sort((left, right) => String(right.id).localeCompare(String(left.id)));
	      const tokenWeights = buildTokenWeights(sortedRecords);
	      const kept = [];
	      const keptProfiles = [];

	      for (const record of sortedRecords) {
	        const profile = makePromptProfile(record.prompt, tokenWeights);

	        let isDuplicate = false;
	        for (let index = 0; index < keptProfiles.length; index += 1) {
	          if (promptSimilarity(profile, keptProfiles[index]) >= getSimilarityThreshold()) {
	            isDuplicate = true;
	            break;
	          }
	        }

	        if (isDuplicate) {
	          continue;
	        }

	        kept.push(record);
	        keptProfiles.push(profile);
	      }

	      return kept;
	    }

	    function updateOutputPrompts() {
	      state.dedupedRecords = dedupeRecords(state.records);
	      syncOutputPrompts();
	    }

	    function getSimilarityThreshold() {
	      return 0.95 - (Number(similarityInput.value) / 200);
	    }

    function collectGenerationObjects(value) {
      if (Array.isArray(value)) {
        return value;
      }

      if (value && typeof value === "object") {
        for (const key of ["generations", "data", "items", "results"]) {
          if (Array.isArray(value[key])) {
            return value[key];
          }
        }

        return [value];
      }

      return [];
    }

	    async function processFiles(fileList, options = {}) {
	      const incomingFiles = Array.from(fileList);
	      const shouldShowSpinnerImmediately = options.generationsOnly || incomingFiles.length > 25;
	      const stopSpinner = options.useExistingSpinner ? null : createSpinnerDelay(shouldShowSpinnerImmediately ? 0 : 200);
	      await waitForPaint();
	      const files = incomingFiles.filter((file) => {
        const fileName = file.name.toLowerCase();
        const isJson = fileName.endsWith(".json") || file.type === "application/json";
        const matchesFolderFilter = !options.generationsOnly || fileName.includes("generations");
        if (!isJson) {
          state.errors += 1;
        }
        return isJson && matchesFolderFilter;
      });

	      for (const file of files) {
	        try {
	          const text = await file.text();
	          const fingerprint = fileFingerprint(text);
	          if (state.loadedFileHashes.has(fingerprint)) {
	            continue;
	          }

	          const json = JSON.parse(text);
	          const objects = collectGenerationObjects(json);

	          state.loadedFileHashes.add(fingerprint);
	          state.filesLoaded += 1;
          state.objectsScanned += objects.length;

		          for (const item of objects) {
		            if (item && typeof item.prompt === "string" && item.prompt.trim().length >= 5) {
		              state.records.push(makePromptRecord(item));
		            }
		          }

        } catch (error) {
          state.errors += 1;
        }
	      }

		      if (options.useExistingSpinner) {
		        updateOutputPrompts();
		        render();
		      } else {
		        await refreshDedupe();
		      }
		      if (stopSpinner) {
		        stopSpinner();
		      }
		    }

	    async function collectGenerationFilesFromDirectory(directoryHandle) {
	      const files = [];

	      async function walk(handle) {
	        for await (const entry of handle.values()) {
	          if (entry.kind === "directory") {
	            await walk(entry);
	            continue;
	          }

	          if (entry.kind !== "file") {
	            continue;
	          }

	          const fileName = entry.name.toLowerCase();
	          if (!fileName.includes("generations") || !fileName.endsWith(".json")) {
	            continue;
	          }

	          files.push(await entry.getFile());
	        }
	      }

	      await walk(directoryHandle);
	      return files;
	    }

	    async function chooseFolder() {
	      if (window.showDirectoryPicker) {
	        try {
	          let directoryHandle;
	          try {
	            directoryHandle = await window.showDirectoryPicker({ mode: "read", startIn: "downloads" });
	          } catch (error) {
	            if (error.name === "AbortError") {
	              return;
	            }
	            directoryHandle = await window.showDirectoryPicker({ mode: "read" });
	          }
	          const stopSpinner = createSpinnerDelay(0);
	          await waitForPaint();
	          try {
	            const files = await collectGenerationFilesFromDirectory(directoryHandle);
	            await processFiles(files, { useExistingSpinner: true });
	          } finally {
	            stopSpinner();
	          }
	          return;
	        } catch (error) {
	          if (error.name === "AbortError") {
	            return;
	          }
	        }
	      }

	      folderInput.click();
	    }

	    function clearState() {
	      state.filesLoaded = 0;
	      state.objectsScanned = 0;
	      state.records = [];
	      state.outputRecords = [];
	      state.dedupedRecords = [];
	      state.loadedFileHashes = new Set();
	      state.errors = 0;
		      similarityInput.value = "50";
		      fileInput.value = "";
		      folderInput.value = "";
		      render();
    }

    function downloadRows() {
      const blob = new Blob([buildCsvRows()], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
	      link.download = "Sora Prompts.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function copyRows() {
      if (window.ClipboardItem && navigator.clipboard.write) {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([buildClipboardHtml()], { type: "text/html" }),
            "text/plain": new Blob([buildCsvRows()], { type: "text/plain" })
          })
        ]);
      } else {
        await navigator.clipboard.writeText(buildCsvRows());
      }
      previewCopyButton.textContent = "Copied";
      setTimeout(() => {
        previewCopyButton.textContent = "Copy to Clipboard";
      }, 10000);
    }

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.add("dragging");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.remove("dragging");
      });
    });

    dropZone.addEventListener("drop", (event) => {
      processFiles(event.dataTransfer.files);
    });

	    fileInput.addEventListener("change", (event) => {
	      processFiles(event.target.files);
	    });

	    folderButton.addEventListener("click", chooseFolder);

	    folderInput.addEventListener("change", (event) => {
	      processFiles(event.target.files, { generationsOnly: true });
	    });

    clearButton.addEventListener("click", clearState);
    similarityInput.addEventListener("input", () => {
      similarityValue.textContent = `${similarityInput.value}%`;
    });

    similarityInput.addEventListener("change", () => {
      refreshDedupe();
    });
    previewCopyButton.addEventListener("click", copyRows);
    downloadButton.addEventListener("click", downloadRows);

    render();
  </script>
</body>
</html>
